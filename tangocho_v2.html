<style>
:root {
  --bg: #0f0d16;
  --surface: #1a1820;
  --surface2: #24213a;
  --border: #44425a;
  --accent: #7c6cfc;
  --accent2: #a89cff;
  --accent-rgb: 124, 108, 252;
  --green: #34d399;
  --red: #f87171;
  --yellow: #fbbf24;
  --text: #e8e8f0;
  --text2: #b0b0c8;
  --text3: #7a7a92;
  --radius: 14px;
  --radius-sm: 8px;
}
[data-theme="green"] {
  --accent: #84cc16;
  --accent2: #bef264;
  --accent-rgb: 132, 204, 22;
  --bg: #0b0f07;
  --surface: #131a0d;
  --surface2: #1c2714;
  --border: #3a5228;
  --text3: #7a8a6a;
}
[data-theme="amber"] {
  --accent: #d97706;
  --accent2: #fbbf24;
  --accent-rgb: 217, 119, 6;
  --bg: #120e07;
  --surface: #1e1608;
  --surface2: #2c2010;
  --border: #5a3e10;
  --text3: #8a7a5a;
}
[data-theme="blue"] {
  --accent: #38bdf8;
  --accent2: #7dd3fc;
  --accent-rgb: 56, 189, 248;
  --bg: #07101a;
  --surface: #0d1a28;
  --surface2: #122438;
  --border: #1e4060;
  --text3: #6a8a9a;
}
html { min-height: 100%; }
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }

/* Nav - 下部固定 */
.nav { display: flex; gap: 0; background: var(--surface); border-top: 1px solid var(--border); position: fixed; bottom: 0; left: 0; right: 0; z-index: 100; padding-bottom: env(safe-area-inset-bottom); }
.nav-btn { flex: 1; padding: 10px 4px 10px; border: none; background: none; color: var(--text2); font-size: 11px; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px; transition: color .2s; }
.nav-btn svg { width: 22px; height: 22px; }
.nav-btn.active { color: var(--accent2); }

/* Pages */
.page { display: none; padding: 0 16px 100px; max-width: 680px; margin: 0 auto; }
.page.active { display: block; }

/* Hero header */
.hero { display: flex; flex-direction: column; align-items: center; padding: 42px 0 24px; }
.hero-cat { width: 110px; height: 110px; margin-bottom: 14px; }
.hero-title { font-size: 32px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 10px; background: linear-gradient(135deg, var(--accent2), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.theme-dots { display: flex; gap: 12px; margin-top: 18px; }
.theme-dot { width: 26px; height: 26px; border-radius: 50%; border: 2.5px solid transparent; cursor: pointer; transition: transform .2s, border-color .2s; padding: 0; }
.theme-dot.active, .theme-dot.selected { border-color: var(--text); transform: scale(1.2); }
.dot-purple { background: #7c6cfc; }
.dot-green { background: #84cc16; }
.dot-amber { background: #d97706; }
.dot-blue { background: #38bdf8; }

/* Search header */
.search-sticky { background: var(--bg); padding: 12px 0 8px; margin-top: 18px; }
.search-wrap { position: relative; }
.search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text3); width: 18px; height: 18px; pointer-events: none; }
#search-input { width: 100%; padding: 14px 46px 14px 44px; background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); color: var(--text); font-size: 16px; outline: none; transition: border-color .2s; -webkit-appearance: none; }
#search-input:focus { border-color: var(--accent); }
#search-input::placeholder { color: var(--text3); }
#search-clear { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: var(--text3); border: none; border-radius: 50%; width: 22px; height: 22px; cursor: pointer; display: none; align-items: center; justify-content: center; flex-shrink: 0; }
#search-clear svg { width: 12px; height: 12px; }

.filter-row { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
.filter-btn { padding: 7px 16px; border-radius: 20px; border: 1.5px solid var(--border); background: none; color: var(--text2); font-size: 13px; cursor: pointer; transition: all .2s; }
.filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.result-count { font-size: 13px; color: var(--text3); padding: 8px 0 4px; }

/* Word card */
.word-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 10px; transition: border-color .2s; }
.word-card-header { display: flex; align-items: center; gap: 10px; }
.word-en { font-size: 20px; font-weight: 600; color: var(--text); flex: 1; }
.word-book-tag { font-size: 12px; padding: 2px 8px; border-radius: 10px; background: rgba(var(--accent-rgb),0.15); color: var(--accent2); border: 1px solid rgba(var(--accent-rgb),0.3); white-space: nowrap; }
.word-jp { font-size: 15px; color: var(--text2); margin-top: 6px; line-height: 1.6; }
.more-btn { background: none; border: none; color: var(--accent2); font-size: 13px; cursor: pointer; padding: 2px 0 0; display: block; }
.word-actions { display: flex; gap: 8px; margin-top: 12px; }
.btn-icon { width: 36px; height: 36px; border-radius: var(--radius-sm); border: 1.5px solid var(--border); background: none; color: var(--text2); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .2s; text-decoration: none; flex-shrink: 0; }
.btn-icon:hover { border-color: var(--accent); color: var(--accent2); }
.btn-icon svg { width: 16px; height: 16px; }

/* External links */
.ext-card { background: var(--surface2); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 10px; }
.ext-title { font-size: 13px; color: var(--text3); margin-bottom: 10px; }
.ext-links { display: flex; gap: 8px; flex-wrap: wrap; }
.ext-link { padding: 8px 16px; border-radius: 20px; border: 1.5px solid var(--border); background: none; color: var(--accent2); font-size: 14px; cursor: pointer; text-decoration: none; display: inline-block; transition: all .2s; }
.ext-link:hover { background: var(--accent); border-color: var(--accent); color: #fff; }

/* Books */
.page-title { font-size: 22px; font-weight: 700; margin: 16px 0; }
.book-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 10px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: all .2s; }
.book-card:hover { border-color: var(--accent); }
.book-icon { width: 44px; height: 44px; border-radius: 10px; background: rgba(var(--accent-rgb),0.15); display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
.book-info { flex: 1; }
.book-name { font-size: 16px; font-weight: 600; }
.book-count { font-size: 13px; color: var(--text2); margin-top: 2px; }
.book-arrow svg { width: 16px; height: 16px; color: var(--text3); }
.btn-primary { width: 100%; padding: 14px; background: var(--accent); border: none; border-radius: var(--radius); color: #fff; font-size: 16px; font-weight: 600; cursor: pointer; transition: opacity .2s; margin-bottom: 10px; }
.btn-secondary { width: 100%; padding: 14px; background: none; border: 1.5px solid var(--border); border-radius: var(--radius); color: var(--text2); font-size: 15px; cursor: pointer; transition: all .2s; margin-bottom: 10px; }

/* Quiz/Flash setup */
.quiz-setup { text-align: center; padding: 20px 0; }
.quiz-setup h2 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
.quiz-setup p { color: var(--text2); font-size: 14px; margin-bottom: 24px; }
.setup-options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
.setup-opt { padding: 14px; border-radius: var(--radius); border: 2px solid var(--border); background: none; color: var(--text); cursor: pointer; transition: all .2s; font-size: 14px; }
.setup-opt.selected { border-color: var(--accent); background: rgba(var(--accent-rgb),0.15); color: var(--accent2); }
.section-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: .08em; margin: 20px 0 10px; text-align: left; }

/* Quiz */
.quiz-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 24px; text-align: center; margin-bottom: 16px; }
.quiz-progress { font-size: 13px; color: var(--text3); margin-bottom: 12px; }
.progress-bar { height: 4px; background: var(--border); border-radius: 2px; margin-bottom: 20px; }
.progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width .3s; }
.quiz-word { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
.quiz-hint { font-size: 13px; color: var(--text3); margin-bottom: 24px; }
.quiz-choices { display: grid; gap: 10px; }
.quiz-choice { padding: 14px; border-radius: var(--radius); border: 1.5px solid var(--border); background: var(--surface2); color: var(--text); cursor: pointer; font-size: 15px; text-align: left; transition: all .2s; }
.quiz-choice.correct { border-color: var(--green); background: rgba(52,211,153,0.15); color: var(--green); }
.quiz-choice.wrong { border-color: var(--red); background: rgba(248,113,113,0.15); color: var(--red); }

/* Flash */
.flash-card-wrap { perspective: 1000px; margin-bottom: 20px; }
.flash-card { width: 100%; min-height: 220px; border-radius: var(--radius); position: relative; transform-style: preserve-3d; transition: transform .5s; cursor: pointer; }
.flash-card.flipped { transform: rotateY(180deg); }
.flash-front, .flash-back { position: absolute; width: 100%; min-height: 220px; border-radius: var(--radius); backface-visibility: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
.flash-front { background: var(--surface); border: 1.5px solid var(--border); }
.flash-back { background: linear-gradient(135deg, rgba(var(--accent-rgb),0.2), var(--surface)); border: 1.5px solid var(--accent); transform: rotateY(180deg); }
.flash-word { font-size: 30px; font-weight: 700; text-align: center; }
.flash-meaning { font-size: 16px; color: var(--text2); text-align: center; line-height: 1.6; margin-top: 12px; }
.flash-hint { font-size: 13px; color: var(--text3); margin-top: 12px; }
.flash-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.btn-wrong { padding: 14px; border-radius: var(--radius); border: 1.5px solid rgba(248,113,113,0.4); background: rgba(248,113,113,0.1); color: var(--red); font-size: 15px; cursor: pointer; }
.btn-correct { padding: 14px; border-radius: var(--radius); border: 1.5px solid rgba(52,211,153,0.4); background: rgba(52,211,153,0.1); color: var(--green); font-size: 15px; cursor: pointer; }

/* Result */
.quiz-result { text-align: center; padding: 30px 0; }
.result-score { font-size: 64px; font-weight: 800; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.result-label { font-size: 16px; color: var(--text2); margin-bottom: 24px; }
.result-detail { background: var(--surface); border-radius: var(--radius); padding: 16px; margin-bottom: 20px; text-align: left; }
.result-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
.result-row:last-child { border-bottom: none; }

/* Modal */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.75); z-index: 200; display: none; align-items: flex-start; justify-content: center; padding: 24px 16px; backdrop-filter: blur(4px); }
.modal-overlay.show { display: flex; }
.modal { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 20px; width: 100%; max-width: 480px; max-height: calc(100dvh - 48px); overflow-y: scroll; -webkit-overflow-scrolling: touch; }
.modal-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; }
.form-group { margin-bottom: 14px; }
.form-label { font-size: 13px; color: var(--text2); margin-bottom: 6px; display: block; }
.form-input { width: 100%; padding: 12px 14px; background: var(--surface2); border: 1.5px solid var(--border); border-radius: var(--radius-sm); color: var(--text); font-size: 15px; outline: none; -webkit-appearance: none; }
.form-input:focus { border-color: var(--accent); }
.form-textarea { width: 100%; padding: 12px 14px; background: var(--surface2); border: 1.5px solid var(--border); border-radius: var(--radius-sm); color: var(--text); font-size: 14px; outline: none; height: 120px; resize: none; overflow-y: scroll; -webkit-overflow-scrolling: touch; font-family: inherit; -webkit-appearance: none; appearance: none; }
.form-textarea:focus { border-color: var(--accent); }
.modal-actions { display: flex; gap: 10px; margin-top: 16px; }
.btn-cancel { flex: 1; padding: 12px; border-radius: var(--radius-sm); border: 1.5px solid var(--border); background: none; color: var(--text2); cursor: pointer; font-size: 15px; }
.btn-save { flex: 1; padding: 12px; border-radius: var(--radius-sm); border: none; background: var(--accent); color: #fff; cursor: pointer; font-size: 15px; font-weight: 600; }

/* Toast */
.toast { position: fixed; bottom: calc(80px + env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%); background: var(--surface2); border: 1.5px solid var(--border); border-radius: 20px; padding: 10px 20px; font-size: 14px; z-index: 300; opacity: 0; transition: opacity .3s; pointer-events: none; white-space: nowrap; }
.toast.show { opacity: 1; }

.no-result { text-align: center; color: var(--text3); padding: 48px 20px; font-size: 15px; }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<nav class="nav">
  <button class="nav-btn active" onclick="showPage('search')" id="nav-search">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    検索
  </button>
  <button class="nav-btn" onclick="showPage('books')" id="nav-books">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
    単語帳
  </button>
  <button class="nav-btn" onclick="showPage('quiz')" id="nav-quiz">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><path d="M12 17h.01"/></svg>
    クイズ
  </button>
  <button class="nav-btn" onclick="showPage('flash')" id="nav-flash">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
    カード
  </button>
</nav>

<!-- Search Page -->
<div class="page active" id="page-search">
  <div class="hero">
    <svg class="hero-cat" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- ears -->
      <polygon points="18,42 26,18 38,38" fill="var(--accent)"/>
      <polygon points="62,38 74,18 82,42" fill="var(--accent)"/>
      <polygon points="22,40 27,24 36,38" fill="var(--accent2)" opacity="0.6"/>
      <polygon points="64,38 73,24 78,40" fill="var(--accent2)" opacity="0.6"/>
      <!-- head -->
      <ellipse cx="50" cy="55" rx="34" ry="30" fill="var(--accent2)"/>
      <!-- face shading -->
      <ellipse cx="50" cy="60" rx="22" ry="18" fill="var(--accent2)" opacity="0.5"/>
      <!-- eyes -->
      <ellipse cx="38" cy="50" rx="5" ry="6" fill="#1a1a22"/>
      <ellipse cx="62" cy="50" rx="5" ry="6" fill="#1a1a22"/>
      <circle cx="39.5" cy="48.5" r="1.5" fill="white"/>
      <circle cx="63.5" cy="48.5" r="1.5" fill="white"/>
      <!-- nose -->
      <ellipse cx="50" cy="60" rx="3" ry="2" fill="var(--red)"/>
      <!-- mouth -->
      <path d="M47 62 Q50 66 53 62" stroke="#1a1a22" stroke-width="1.5" stroke-linecap="round" fill="none"/>
      <!-- whiskers left -->
      <line x1="16" y1="57" x2="44" y2="61" stroke="var(--accent)" stroke-width="1.2" stroke-linecap="round" opacity="0.8"/>
      <line x1="16" y1="62" x2="44" y2="63" stroke="var(--accent)" stroke-width="1.2" stroke-linecap="round" opacity="0.8"/>
      <!-- whiskers right -->
      <line x1="84" y1="57" x2="56" y2="61" stroke="var(--accent)" stroke-width="1.2" stroke-linecap="round" opacity="0.8"/>
      <line x1="84" y1="62" x2="56" y2="63" stroke="var(--accent)" stroke-width="1.2" stroke-linecap="round" opacity="0.8"/>
      <!-- body -->
      <ellipse cx="50" cy="88" rx="20" ry="12" fill="var(--accent)" opacity="0.6"/>
    </svg>
    <div class="hero-title">tangocho</div>
    <div class="theme-dots">
      <button class="theme-dot dot-purple" data-theme="dark" onclick="setTheme('purple')" title="パープル"></button>
      <button class="theme-dot dot-green" data-theme="green" onclick="setTheme('green')" title="ライムグリーン"></button>
      <button class="theme-dot dot-amber" data-theme="warm" onclick="setTheme('amber')" title="イエロー＆ブラウン"></button>
      <button class="theme-dot dot-blue" data-theme="blue" onclick="setTheme('blue')" title="ライトブルー"></button>
    </div>
  </div>
  <div class="search-sticky">
    <div class="search-wrap">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="search" id="search-input" placeholder="英語または日本語で検索..." autocomplete="off" autocorrect="off" spellcheck="false" autocapitalize="none" inputmode="latin" pattern="[A-Za-z0-9 ]*" lang="en">
      <button id="search-clear" onclick="clearSearch()">
        <svg viewBox="0 0 12 12" fill="none"><path d="M2 2l8 8M10 2l-8 8" stroke="white" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
    </div>
    <div class="filter-row">
      <button class="filter-btn active" onclick="setFilter('all')" id="filter-all">すべて</button>
      <button class="filter-btn" onclick="setFilter('mywords')" id="filter-mywords">マイ単語</button>
      <button class="filter-btn" onclick="setFilter('recent')" id="filter-recent">履歴</button>
    </div>
    <div class="result-count" id="result-count"></div>
  </div>
  <div id="search-results"></div>
</div>

<!-- Wordbooks Page -->
<div class="page" id="page-books">
  <div class="page-title">単語帳</div>
  <button class="btn-primary" onclick="showCreateBook()">＋ 新しい単語帳を作る</button>
  <div id="books-list"></div>
  <div class="section-label">テーマカラー</div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px" id="theme-btns">
    <button class="theme-btn setup-opt" data-theme="dark" onclick="applyTheme('dark')">🌙 ダーク</button>
    <button class="theme-btn setup-opt" data-theme="green" onclick="applyTheme('green')">🌿 グリーン</button>
    <button class="theme-btn setup-opt" data-theme="warm" onclick="applyTheme('warm')">🍵 茶色・黄色</button>
    <button class="theme-btn setup-opt" data-theme="blue" onclick="applyTheme('blue')">🌊 ブルー</button>
  </div>
  <div class="section-label">アカウント（自動同期）</div>
  <div id="auth-ui"></div>
  <div class="section-label">データ管理</div>
  <button class="btn-secondary" onclick="exportCSV()">📥 CSVでバックアップ</button>
  <button class="btn-secondary" onclick="exportJSON()">📤 マイ単語をコピー（他の端末へ）</button>
  <button class="btn-secondary" onclick="showImportJSON()">📥 マイ単語を読み込む（他の端末から）</button>
  <button class="btn-secondary" onclick="showAddWord()">＋ 単語を追加</button>
</div>

<!-- Quiz Page -->
<div class="page" id="page-quiz">
  <div id="quiz-content"></div>
</div>

<!-- Flash Page -->
<div class="page" id="page-flash">
  <div id="flash-content"></div>
</div>

<!-- Modals -->
<div class="modal-overlay" id="modal-edit">
  <div class="modal">
    <div class="modal-title" id="modal-edit-title">単語を編集</div>
    <div class="form-group">
      <label class="form-label">英単語</label>
      <input class="form-input" id="edit-word" placeholder="英単語">
    </div>
    <div class="form-group">
      <label class="form-label">日本語の意味</label>

const _SB_URL = 'https://disfgytjjflnlowywess.supabase.co';
const _SB_KEY = 'sb_publishable_om-kf2zIGYcP5CZhxXXgJA_JY1IaBo1';
const _sb = window.supabase.createClient(_SB_URL, _SB_KEY);
let _user = null;

async function supaSave() {
  if (!_user) return;
  await _sb.from('user_data').upsert({
    user_id: _user.id,
    my_words: state.myWords,
    books: state.books,
    updated_at: new Date().toISOString()
  }, { onConflict: 'user_id' });
}

async function supaLoad() {
  if (!_user) return;
  const { data } = await _sb.from('user_data').select().eq('user_id', _user.id).maybeSingle();
  if (data && (data.my_words?.length || data.books?.length)) {
    // クラウドにデータあり → クラウドを使う
    state.myWords = data.my_words || [];
    state.books = data.books || [];
    localStorage.setItem('myWords', JSON.stringify(state.myWords));
    localStorage.setItem('books', JSON.stringify(state.books));
  } else {
    // 新規ユーザー → 空で始める（他人のlocalStorageをアップロードしない）
    state.myWords = [];
    state.books = [];
    localStorage.setItem('myWords', '[]');
    localStorage.setItem('books', '[]');
    await supaSave();
  }
  renderSearch();
  if (document.getElementById('page-books').classList.contains('active')) renderBooks();
  showToast('クラウドから同期しました');
}

function renderAuthUI() {
  const el = document.getElementById('auth-ui');
  if (_user) {
    if (el) el.innerHTML = `
      <div style="background:var(--surface2);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:10px">
        <div style="font-size:12px;color:var(--text3);margin-bottom:4px">ログイン中 — 自動同期ON</div>
        <div style="font-size:14px;color:var(--text)">${_user.email}</div>
      </div>
      <button class="btn-secondary" onclick="authLogout()">ログアウト</button>
    `;
  } else {
    if (el) el.innerHTML = `<button class="btn-primary" onclick="document.getElementById('modal-auth').classList.add('show')">ログインして同期する</button>`;
  }
}

async function authLogin() {
  const email = document.getElementById('auth-email').value.trim();
  const pass = document.getElementById('auth-pass').value;
  const msg = document.getElementById('auth-msg');
  msg.textContent = '...'; msg.style.color = 'var(--text3)';
  const { error } = await _sb.auth.signInWithPassword({ email, password: pass });
  if (error) {
    msg.style.color = 'var(--red)';
    msg.textContent = error.message === 'Invalid login credentials'
      ? 'メールまたはパスワードが違います' : error.message;
  } else {
    closeModal('modal-auth');
    showToast('ログインしました');
  }
}

async function authSignup() {
  const email = document.getElementById('auth-email').value.trim();
  const pass = document.getElementById('auth-pass').value;
  const msg = document.getElementById('auth-msg');
  if (!email || pass.length < 6) {
    msg.style.color = 'var(--red)';
    msg.textContent = 'メールとパスワード（6文字以上）を入力してください';
    return;
  }
  msg.textContent = '...'; msg.style.color = 'var(--text3)';
  const { error } = await _sb.auth.signUp({ email, password: pass });
  if (error) {
    msg.style.color = 'var(--red)';
    msg.textContent = error.message;
  } else {
    msg.style.color = 'var(--green)';
    msg.textContent = '確認メールを送りました。メール内のリンクをクリックしてからログインしてください。';
  }
}

async function authResetPassword() {
  const email = document.getElementById('auth-email').value.trim();
  const msg = document.getElementById('auth-msg');
  if (!email) {
    msg.style.color = 'var(--red)';
    msg.textContent = '上のメールアドレス欄にメールを入力してから押してください';
    return;
  }
  msg.style.color = 'var(--text3)';
  msg.textContent = '送信中...';
  const { error } = await _sb.auth.resetPasswordForEmail(email, {
    redirectTo: 'https://hei86gns.github.io/tangocho/'
  });
  if (error) {
    msg.style.color = 'var(--red)';
    const m = error?.message || '';
    if (m.toLowerCase().includes('rate') || m.includes('429')) {
      msg.textContent = '⚠️ メール送信数の上限です。1時間後に再試行してください。';
    } else if (!m || m === '{}') {
      msg.textContent = '⚠️ エラーが発生しました。しばらく待ってから再試行してください。';
    } else {
      msg.textContent = m;
    }
  } else {
    msg.style.color = 'var(--green)';
    msg.textContent = '✓ パスワードリセットメールを送りました。メールを確認してください。';
  }
}

async function setNewPassword() {
  const pass = document.getElementById('newpass-input').value;
  const msg = document.getElementById('newpass-msg');
  if (pass.length < 6) {
    msg.textContent = '6文字以上で入力してください';
    return;
  }
  const { error } = await _sb.auth.updateUser({ password: pass });
  if (error) {
    msg.style.color = 'var(--red)';
    msg.textContent = error.message;
  } else {
    closeModal('modal-newpass');
    showToast('パスワードを設定しました！');
    await supaLoad();
  }
}

async function authLogout() {
  await _sb.auth.signOut();
  _user = null;
  renderAuthUI();
  showToast('ログアウトしました');
}

_sb.auth.onAuthStateChange(async (event, session) => {
  _user = session?.user || null;
  renderAuthUI();
  if (event === 'PASSWORD_RECOVERY') {
    document.getElementById('modal-newpass').classList.add('show');
  } else if (_user && (event === 'SIGNED_IN' || event === 'TOKEN_REFRESHED')) {
    await supaLoad();
  }
});

_sb.auth.getSession().then(({ data: { session } }) => {
  _user = session?.user || null;
  renderAuthUI();
  if (_user) supaLoad();
});

function setTheme(theme) {
  const normalized = theme === 'purple' ? 'dark' : theme === 'amber' ? 'warm' : theme;
  applyTheme(normalized);
}

function getAllWords() {
  const map = new Map();
  BUILTIN.forEach(v => map.set(v.w.toLowerCase(), {w: v.w, m: v.m, builtin: true}));
  state.myWords.forEach(v => map.set(v.w.toLowerCase(), {w: v.w, m: v.m, builtin: false, added: v.added}));
  return [...map.values()];
}

// ========== SEARCH ==========
function setFilter(f) {
  state.filter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('filter-' + f).classList.add('active');
  renderSearch();
}

document.getElementById('search-input').addEventListener('input', e => {
  state.query = e.target.value;
  const clearBtn = document.getElementById('search-clear');
  clearBtn.style.display = state.query ? 'flex' : 'none';
  renderSearch();
});

function clearSearch() {
  document.getElementById('search-input').value = '';
  state.query = '';
  document.getElementById('search-clear').style.display = 'none';
  renderSearch();
  document.getElementById('search-input').focus();
}

function getGoogleUrl(q) {
  const isJP = /[\u3000-\u9fff\u30a0-\u30ff\u3040-\u309f]/.test(q);
  if (isJP) {
    return 'https://www.google.com/search?q=' + encodeURIComponent(q + ' English translation') + '&hl=ja';
  } else {
    return 'https://www.google.com/search?q=' + encodeURIComponent(q + ' 意味 日本語') + '&hl=ja';
  }
}

function renderSearch() {
  const q = state.query.trim().toLowerCase();
  const all = getAllWords();
  let pool;
  if (state.filter === 'mywords') {
    pool = all.filter(v => !v.builtin);
  } else if (state.filter === 'recent') {
    pool = all.filter(v => !v.builtin).sort((a, b) => (b.added || 0) - (a.added || 0));
  } else {
    pool = all;
  }

  let results;
  if (!q) {
    results = pool.slice(0, 60);
  } else {
    // 前方一致を優先
    const startsWith = pool.filter(v => v.w.toLowerCase().startsWith(q) || v.m.toLowerCase().startsWith(q));
    const contains = pool.filter(v =>
      !v.w.toLowerCase().startsWith(q) && !v.m.toLowerCase().startsWith(q) &&
      (v.w.toLowerCase().includes(q) || v.m.toLowerCase().includes(q))
    );
    results = [...startsWith, ...contains];
  }

  const resultLabel = q
    ? results.length + ' 件'
    : state.filter === 'mywords'
      ? 'マイ単語 ' + pool.length + ' 語'
      : state.filter === 'recent'
        ? '履歴 ' + pool.length + ' 語'
        : '全 ' + all.length.toLocaleString() + ' 語';
  document.getElementById('result-count').textContent = resultLabel;

  const container = document.getElementById('search-results');

  if (results.length === 0 && q) {
    container.innerHTML = `
      <div class="no-result">「${esc(state.query)}」は見つかりませんでした</div>
      <div class="ext-card">
        <div class="ext-title">📖 外部辞書・ウェブで検索</div>
        <div class="ext-links">
          <a class="ext-link" href="https://ejje.weblio.jp/content/${encodeURIComponent(state.query)}" target="_blank">Weblio</a>
          <a class="ext-link" href="https://eow.alc.co.jp/search?q=${encodeURIComponent(state.query)}" target="_blank">英辞郎</a>
          <a class="ext-link" href="${getGoogleUrl(state.query)}" target="_blank">🌐 Google</a>
        </div>
      </div>
      <button class="btn-secondary" style="margin-top:8px" onclick="showAddWordWithQuery()">＋ この単語を追加する</button>
    `;
    return;
  }

  window._wm = {};
  const _r = results.slice(0, 100);
  _r.forEach((v, i) => { window._wm[i] = v.m; });
  container.innerHTML = _r.map((v, i) => `
    <div class="word-card">
      <div class="word-card-header">
        <div class="word-en">${esc(v.w)}</div>
        ${!v.builtin ? '<span class="word-book-tag">マイ単語</span>' : ''}
      </div>
      <div class="word-jp" id="wmt${i}">${esc(v.m.length>120?v.m.substring(0,120)+'…':v.m)}</div>
      ${v.m.length>120?`<button class="more-btn" id="wmb${i}" onclick="toggleJp(${i})">▾ 続きを読む</button>`:''}
      <div class="word-actions">
        <button class="btn-icon" onclick="speak('${esc(v.w).replace(/'/g,"\\'")}')" title="発音">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
        </button>
        <button class="btn-icon" onclick="showEditWord('${esc(v.w).replace(/'/g,"\\'")}')" title="編集">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </button>
        <button class="btn-icon" onclick="showAddToBook('${esc(v.w).replace(/'/g,"\\'")}')" title="単語帳に追加">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/><line x1="12" y1="9" x2="12" y2="15"/><line x1="9" y1="12" x2="15" y2="12"/></svg>
        </button>
        <a class="btn-icon" href="${getGoogleUrl(v.w)}" target="_blank" title="Webで検索">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
        </a>
      </div>
    </div>
  `).join('') + (results.length > 100 ? `<div class="no-result">他 ${results.length-100} 件（検索で絞り込んでください）</div>` : '');
}

function toggleJp(i) {
  const t = document.getElementById('wmt' + i);
  const b = document.getElementById('wmb' + i);
  if (!t || !b || !window._wm) return;
  const expanded = b.textContent.startsWith('▴');
  t.textContent = expanded ? window._wm[i].substring(0, 120) + '…' : window._wm[i];
  b.textContent = expanded ? '▾ 続きを読む' : '▴ 閉じる';
}

// ========== SPEAK ==========
let _cachedVoice = null;
function _pickVoice() {
  const vs = speechSynthesis.getVoices();
  _cachedVoice = vs.find(v => v.lang === 'en-US' && v.name === 'Samantha')
    || vs.find(v => v.lang === 'en-US' && (v.name.includes('Enhanced') || v.name.includes('Premium')))
    || vs.find(v => v.lang === 'en-US' && v.name.includes('Google'))
    || vs.find(v => v.lang === 'en-US' && !v.name.toLowerCase().includes('compact'))
    || vs.find(v => v.lang.startsWith('en'))
    || null;
}
if ('speechSynthesis' in window) {
  speechSynthesis.addEventListener('voiceschanged', _pickVoice);
  _pickVoice();
}

function speak(word) {
  if (!('speechSynthesis' in window)) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(word);
  u.lang = 'en-US';
  if (_cachedVoice) u.voice = _cachedVoice;
  speechSynthesis.speak(u);
}

// ========== EDIT / ADD ==========
function showEditWord(word) {
  const all = getAllWords();
  const v = all.find(x => x.w.toLowerCase() === word.toLowerCase());
  if (!v) return;
  state.editMode = 'edit';
  state.editWord = word;
  document.getElementById('modal-edit-title').textContent = '単語を編集';
  document.getElementById('edit-word').value = v.w;
  document.getElementById('edit-word').disabled = false;
  document.getElementById('edit-meaning').value = v.m;
  document.getElementById('edit-book-group').style.display = 'none';
  document.getElementById('modal-edit').classList.add('show');
}

function showAddWord() {
  state.editMode = 'add';
  document.getElementById('modal-edit-title').textContent = '単語を追加';
  document.getElementById('edit-word').value = '';
  document.getElementById('edit-word').disabled = false;
  document.getElementById('edit-meaning').value = '';
  document.getElementById('edit-book-group').style.display = 'none';
  document.getElementById('modal-edit').classList.add('show');
}

function showAddWordWithQuery() {
  showAddWord();
  const isJP = /[\u3000-\u9fff]/.test(state.query);
  if (isJP) {
    document.getElementById('edit-meaning').value = state.query;
  } else {
    document.getElementById('edit-word').value = state.query;
  }
}

function saveEdit() {
  const w = document.getElementById('edit-word').value.trim();
  const m = document.getElementById('edit-meaning').value.trim();
  if (!w || !m) { showToast('単語と意味を入力してください'); return; }

  if (state.editMode === 'add') {
    state.myWords.push({w, m, added: Date.now()});
    save();
    closeModal('modal-edit');
    renderSearch();
    // 単語帳があれば追加を促す
    if (state.books.length > 0) {
      setTimeout(() => showAddToBook(w), 400);
    } else {
      showToast('追加しました');
    }
  } else {
    const idx = state.myWords.findIndex(x => x.w.toLowerCase() === state.editWord.toLowerCase());
    if (idx >= 0) {
      state.myWords[idx] = {w, m, added: state.myWords[idx].added || Date.now()};
    } else {
      state.myWords.push({w, m, added: Date.now()});
    }
    save();
    showToast('保存しました');
    closeModal('modal-edit');
    renderSearch();
  }
}

function showAddToBook(word) {
  if (state.books.length === 0) {
    showToast('まず単語帳を作成してください');
    showPage('books');
    return;
  }
  state.addBookWord = word;
  document.getElementById('modal-addbook-title').textContent = '「' + word + '」を単語帳に追加';
  const sel = document.getElementById('addbook-select');
  sel.innerHTML = state.books.map((b,i) => `<option value="${i}">${esc(b.name)}</option>`).join('');
  document.getElementById('modal-addbook').classList.add('show');
}

function saveAddToBook() {
  const bookIdx = parseInt(document.getElementById('addbook-select').value);
  state.books[bookIdx].words = state.books[bookIdx].words || [];

    showToast('単語帳に追加しました');

function exportCSV() {
  const all = getAllWords();
  const bom = '\uFEFF';
  const rows = all.map(v => `"${v.w.replace(/"/g,'""')}","${v.m.replace(/"/g,'""')}"`).join('\n');
  const blob = new Blob([bom + '英単語,日本語の意味\n' + rows], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'tangocho_backup.csv';
  a.click();
  showToast('バックアップしました');
}

// ========== JSON EXPORT / IMPORT ==========
function exportJSON() {
  const json = JSON.stringify(state.myWords, null, 0);
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(json).then(() => showToast('クリップボードにコピーしました（他の端末で貼り付け）'));
  } else {
    prompt('以下のテキストをコピーしてください:', json);
  }
}

function showImportJSON() {
  document.getElementById('import-json').value = '';
  document.getElementById('import-preview').textContent = '';
  document.getElementById('modal-import').classList.add('show');
}

function importJSON() {
  try {
    const raw = document.getElementById('import-json').value.trim();
    const imported = JSON.parse(raw);
    if (!Array.isArray(imported)) throw new Error('配列ではありません');
    const existing = new Set(state.myWords.map(w => w.w.toLowerCase()));
    const newWords = imported.filter(v => v.w && v.m && !existing.has(v.w.toLowerCase()));
    state.myWords.push(...newWords);
    save();
    closeModal('modal-import');
    renderSearch();
    showToast(`${newWords.length}語を追加しました（重複${imported.length - newWords.length}件スキップ）`);
  } catch(e) {
    document.getElementById('import-preview').textContent = '⚠️ 形式が正しくありません: ' + e.message;
  }
}

let quizSetup = {scope:'all', book:'all'};

function renderQuizSetup() {
  document.getElementById('quiz-content').innerHTML = `
    <div class="quiz-setup">
      <h2>🎯 10問クイズ</h2>
      <p>英単語の日本語の意味を選んでください</p>
      <div class="section-label">出題範囲</div>
      <div class="setup-options">
        <button class="setup-opt selected" onclick="setQuizOpt(this,'scope','all')">全単語</button>
        <button class="setup-opt" onclick="setQuizOpt(this,'scope','recent')">最近登録</button>
      </div>
      <div class="section-label">単語帳</div>
      <div class="setup-options">
        <button class="setup-opt selected" onclick="setQuizOpt(this,'book','all')">すべて</button>
        ${state.books.map((b,i) => `<button class="setup-opt" onclick="setQuizOpt(this,'book',${i})">${esc(b.name)}</button>`).join('')}
      </div>
      <button class="btn-primary" onclick="startQuiz()">スタート</button>
    </div>
  `;
  quizSetup = {scope:'all', book:'all'};
}

function setQuizOpt(el, key, val) {
  el.closest('.setup-options').querySelectorAll('.setup-opt').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  quizSetup[key] = val;
}

function startQuiz() {
  let pool = getAllWords();
  if (quizSetup.book !== 'all') {
    const bw = state.books[quizSetup.book].words || [];
    pool = pool.filter(v => bw.includes(v.w.toLowerCase()));
  }
  if (quizSetup.scope === 'recent') {
    const recent = state.myWords.slice(-100);
    pool = recent.length >= 4 ? recent : pool.slice(-100);
  }
  if (pool.length < 4) { showToast('単語が少なすぎます（4語以上必要）'); return; }
  const questions = shuffle(pool).slice(0,10).map(correct => {
    const wrong = shuffle(pool.filter(v => v.w !== correct.w)).slice(0,3);
    return {correct, choices: shuffle([correct, ...wrong])};
  });
  state.quizState = {questions, current:0, score:0, answered:false, results:[]};
  renderQuizQuestion();
}

function renderQuizQuestion() {
  const {questions, current} = state.quizState;
  if (current >= questions.length) { renderQuizResult(); return; }
  const q = questions[current];
  document.getElementById('quiz-content').innerHTML = `
    <div class="quiz-card">
      <div class="quiz-progress">${current+1} / ${questions.length}</div>
      <div class="progress-bar"><div class="progress-fill" style="width:${(current/questions.length)*100}%"></div></div>
      <div class="quiz-word">${esc(q.correct.w)}</div>
      <div style="display:flex;justify-content:center;margin:4px 0 0">
        <button class="btn-icon" onclick="speak('${esc(q.correct.w).replace(/'/g,"\\'")}')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
        </button>
      </div>
      <div class="quiz-hint" style="margin-top:10px">日本語の意味は？</div>
      <div class="quiz-choices">
        ${q.choices.map((c,i) => `<button class="quiz-choice" onclick="answerQuiz(${i})">${esc(c.m).substring(0,60)}</button>`).join('')}
      </div>
    </div>
  `;
}

function answerQuiz(i) {
  if (state.quizState.answered) return;
  state.quizState.answered = true;
  const {questions, current} = state.quizState;
  const q = questions[current];
  const correct = q.choices[i].w === q.correct.w;
  if (correct) state.quizState.score++;
  state.quizState.results.push({word: q.correct.w, correct});
  document.querySelectorAll('.quiz-choice').forEach((btn, j) => {
    if (q.choices[j].w === q.correct.w) btn.classList.add('correct');
    else if (j === i) btn.classList.add('wrong');
    btn.disabled = true;
  });
  setTimeout(() => {
    state.quizState.current++;
    state.quizState.answered = false;
    renderQuizQuestion();
  }, 1000);
}

function renderQuizResult() {
  const {score, questions, results} = state.quizState;
  document.getElementById('quiz-content').innerHTML = `
    <div class="quiz-result">
      <div class="result-score">${score}<span style="font-size:32px;color:var(--text2)">/${questions.length}</span></div>
      <div class="result-label">${score===10?'パーフェクト！🎉':score>=7?'よくできました！👏':score>=5?'もう少し！💪':'頑張ろう！📚'}</div>
      <div class="result-detail">
        ${results.map(r => `<div class="result-row"><span>${esc(r.word)}</span><span>${r.correct?'<span style="color:var(--green)">✓</span>':'<span style="color:var(--red)">✗</span>'}</span></div>`).join('')}
      </div>
      <button class="btn-primary" onclick="startQuiz()">もう一度</button>
      <button class="btn-secondary" onclick="renderQuizSetup()">設定に戻る</button>
    </div>
  `;
}

function startFlash() {
  let pool = getAllWords();

function renderFlashCard() {
  const fs = state.flashState;
  if (fs.current >= fs.cards.length) { renderFlashResult(); return; }
  const card = fs.cards[fs.current];
  document.getElementById('flash-content').innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <span style="color:var(--text3);font-size:13px">${fs.current+1} / ${fs.cards.length}</span>
      <span style="color:var(--green);font-size:13px">✓ ${fs.score}</span>
    </div>
    <div class="progress-bar" style="margin-bottom:16px"><div class="progress-fill" style="width:${(fs.current/fs.cards.length)*100}%"></div></div>
    <div class="flash-card-wrap">
      <div class="flash-card" id="flash-card" onclick="flipCard()">
        <div class="flash-front">
          <div class="flash-word">${esc(card.w)}</div>
          <button class="btn-icon" style="margin:12px auto 0" onclick="event.stopPropagation();speak('${esc(card.w).replace(/'/g,"\\'")}')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
          </button>
          <div class="flash-hint" style="margin-top:10px">タップして意味を見る</div>
        </div>
        <div class="flash-back">
          <div class="flash-word" style="font-size:20px;margin-bottom:8px">${esc(card.w)}</div>
          <div class="flash-meaning">${esc(card.m)}</div>
        </div>
      </div>
    </div>
    <div id="flash-actions-area">
      <div style="text-align:center;color:var(--text3);font-size:13px;padding:20px">カードをタップしてください</div>
    </div>
  `;
}

function flipCard() {
  document.getElementById('flash-card').classList.toggle('flipped');
  document.getElementById('flash-actions-area').innerHTML = `
    <div class="flash-actions" style="margin-top:16px">
      <button class="btn-wrong" onclick="flashNext(false)">✗ もう一度</button>
      <button class="btn-correct" onclick="flashNext(true)">✓ 覚えた</button>
    </div>
  `;
}

function flashNext(correct) {
  if (correct) state.flashState.score++;
  state.flashState.current++;
  renderFlashCard();
}

function renderFlashResult() {
  const {score, cards} = state.flashState;
  const pct = Math.round(score/cards.length*100);
  document.getElementById('flash-content').innerHTML = `
    <div class="quiz-result">
      <div class="result-score">${pct}<span style="font-size:28px;color:var(--text2)">%</span></div>
      <div class="result-label">${score}/${cards.length} 枚 覚えました！</div>
      <button class="btn-primary" onclick="startFlash()">もう一度</button>
      <button class="btn-secondary" onclick="renderFlashSetup()">設定に戻る</button>
    </div>
  `;
}

// ========== UTILS ==========
function closeModal(id) {
  const el = document.getElementById(id);
  el.classList.remove('show');
  el.querySelectorAll('.modal').forEach(m => m.style.maxHeight = '');
  document.getElementById('edit-word').disabled = false;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}


// ========== THEMES ==========
const THEMES = {
  dark: {
    name: '🌙 ダーク（デフォルト）',
    '--bg': '#0f0f13',
    '--surface': '#1a1a22',
    '--surface2': '#26263a',
    '--border': '#44445a',
    '--accent': '#7c6cfc',
    '--accent2': '#a89cff',
    '--accent-rgb': '124, 108, 252',
    '--text': '#e8e8f0',
    '--text2': '#b0b0c8',
    '--text3': '#7a7a92',
  },
  green: {
    name: '🌿 淡いグリーン',
    '--bg': '#0d1410',
    '--surface': '#162018',
    '--surface2': '#1e2e22',
    '--border': '#2e4a34',
    '--accent': '#4caf78',
    '--accent2': '#80d4a0',
    '--accent-rgb': '76, 175, 120',
    '--text': '#e0f0e8',
    '--text2': '#a0c8b0',
    '--text3': '#5a8a6a',
  },
  warm: {
    name: '🍵 黄色と茶色',
    '--bg': '#141008',
    '--surface': '#201a0c',
    '--surface2': '#2e2410',
    '--border': '#4a3a1a',
    '--accent': '#c8922a',
    '--accent2': '#e8b860',
    '--accent-rgb': '200, 146, 42',
    '--text': '#f0e8d0',
    '--text2': '#c8b890',
    '--text3': '#8a7050',
  },
  blue: {
    name: '🌊 淡いブルー',
    '--bg': '#0a0f18',
    '--surface': '#121a28',
    '--surface2': '#1a2438',
    '--border': '#2a3a58',
    '--accent': '#4a8cdc',
    '--accent2': '#80b4f0',
    '--accent-rgb': '74, 140, 220',
    '--text': '#e0eaf8',
    '--text2': '#a0b8d8',
    '--text3': '#5a78a0',
  },
};

function applyTheme(key) {
  const theme = THEMES[key];
  if (!theme) return;
  const root = document.documentElement;
  Object.entries(theme).forEach(([k, v]) => {
    if (k.startsWith('--')) root.style.setProperty(k, v);
  });
  localStorage.setItem('theme', key);
  // テーマボタンの選択状態更新
  document.querySelectorAll('.theme-btn').forEach(b => {
    b.classList.toggle('selected', b.dataset.theme === key);
  });
  document.querySelectorAll('.theme-dot').forEach(d => {
    const themeKey = d.dataset.theme === 'dark' ? 'dark' : d.dataset.theme;
    d.classList.toggle('active', themeKey === key);
  });
}

// iOS キーボード表示時: モーダルのmax-heightを更新し、フォーカス要素を表示
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', () => {
    const h = window.visualViewport.height - 48;
    document.querySelectorAll('.modal-overlay.show .modal').forEach(el => {
      el.style.maxHeight = h + 'px';
    });
    const active = document.activeElement;
    if (active && active.closest('.modal-overlay.show')) {
      setTimeout(() => active.scrollIntoView({ block: 'nearest' }), 50);
    }
  });
}

// 保存済みテーマを適用
const savedTheme = localStorage.getItem('theme') || 'dark';
// DOM読み込み後に適用
window.addEventListener('DOMContentLoaded', () => {
  applyTheme(savedTheme);
  renderSearch();
});
</script>
